<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700&family=Barlow:wght@500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #C0504A;
    --card-bg: #1a1a1a;
    --digit-color: #ffffff;
    --s: min(17vw, 17vh, 74px);
  }

  body {
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    transition: background 0.4s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: radial-gradient(circle, rgba(0,0,0,0.11) 1.5px, transparent 1.5px);
    background-size: 18px 18px;
    pointer-events: none;
    z-index: 0;
  }

  .clock-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: calc(var(--s) * 0.35);
  }

  .clock-title {
    font-family: 'Barlow', sans-serif;
    font-weight: 500;
    font-size: calc(var(--s) * 0.15);
    letter-spacing: calc(var(--s) * 0.14);
    color: rgba(0,0,0,0.3);
    text-transform: uppercase;
  }

  .clock {
    display: flex;
    align-items: center;
    gap: calc(var(--s) * 0.19);
  }

  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: calc(var(--s) * 0.13);
  }

  .unit-label {
    font-family: 'Barlow', sans-serif;
    font-weight: 500;
    font-size: calc(var(--s) * 0.13);
    letter-spacing: calc(var(--s) * 0.07);
    color: rgba(0,0,0,0.3);
    text-transform: uppercase;
  }

  .flip-group { display: flex; gap: calc(var(--s) * 0.07); }

  /* ── Card ── */
  .flip-card {
    position: relative;
    width: var(--s);
    height: calc(var(--s) * 1.378);
    filter: drop-shadow(calc(var(--s)*0.068) calc(var(--s)*0.068) 0px rgba(0,0,0,0.4));
  }

  /*
   * Structure:
   *  [static-top]  — always visible, shows current value, top half
   *  [static-bot]  — always visible, shows current value, bottom half
   *  [flap-top]    — animated, positioned on top half, rotates down on change
   *  [flap-bot]    — animated, positioned on bottom half, revealed when flap-top lands
   *
   * Each piece is a half-height div with overflow:hidden.
   * Inside each is a .digit-box that is full card height, so the digit
   * is always centered the same way across all four pieces.
   */

  .half {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    background: var(--card-bg);
    border: calc(var(--s) * 0.04) solid #000;
  }
  .half.top {
    top: 0;
    border-radius: calc(var(--s)*0.135) calc(var(--s)*0.135) 0 0;
    border-bottom: calc(var(--s)*0.027) solid #000;
  }
  .half.bot {
    bottom: 0;
    border-radius: 0 0 calc(var(--s)*0.135) calc(var(--s)*0.135);
    border-top: none;
  }

  .digit-box {
    position: absolute;
    left: 0;
    width: 100%;
    height: 200%;  /* full card height */
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: calc(var(--s) * 1.2);
    line-height: 1;
    color: var(--digit-color);
    user-select: none;
  }
  /* top half: anchor digit-box to top so upper half of digit shows */
  .half.top .digit-box { top: 0; }
  /* bot half: anchor digit-box to bottom so lower half of digit shows */
  .half.bot .digit-box { bottom: 0; }

  /* z-layering */
  .static-top { z-index: 1; }
  .static-bot { z-index: 1; }
  .flap-top   { z-index: 3; visibility: hidden; }  /* hidden at rest, shown during animation */
  .flap-bot   { z-index: 2; visibility: hidden; }  /* hidden at rest, shown during animation */

  /* Hinge */
  .hinge {
    position: absolute;
    top: 50%; left: 0; right: 0;
    height: calc(var(--s) * 0.04);
    background: #000;
    z-index: 10;
    transform: translateY(-50%);
  }

  /* Flap-top animation */
  .flap-top {
    transform-origin: bottom center;
  }
  .flap-top.flipping {
    animation: flipDown 0.4s cubic-bezier(.4,0,.6,1) forwards;
  }
  @keyframes flipDown {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }

  /* Separator dots */
  .separator {
    display: flex;
    flex-direction: column;
    gap: calc(var(--s) * 0.216);
    padding-bottom: calc(var(--s) * 0.405);
  }
  .dot {
    width: calc(var(--s) * 0.149);
    height: calc(var(--s) * 0.149);
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    flex-shrink: 0;
    transition: opacity 0.1s ease;
  }
  .dot.off { animation: blink-off 1s forwards; }
  @keyframes blink-off {
    0%   { opacity: 0.1; }
    35%  { opacity: 0.1; }
    36%  { opacity: 1; }
    100% { opacity: 1; }
  }

  /* Color picker */
  .color-picker {
    display: flex;
    gap: calc(var(--s) * 0.135);
    align-items: center;
    background: rgba(0,0,0,0.15);
    padding: calc(var(--s) * 0.108) calc(var(--s) * 0.216);
    border-radius: 999px;
    border: calc(var(--s) * 0.034) solid rgba(0,0,0,0.18);
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90vw;
  }
  .swatch {
    width: calc(var(--s) * 0.297);
    height: calc(var(--s) * 0.297);
    border-radius: 50%;
    cursor: pointer;
    border: calc(var(--s) * 0.04) solid rgba(0,0,0,0.2);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .swatch:hover { transform: scale(1.2); }
  .swatch.active {
    border-color: #fff;
    box-shadow: 0 0 0 calc(var(--s) * 0.034) #000;
    transform: scale(1.15);
  }
</style>
</head>
<body>

<div class="clock-wrapper">
  <div class="clock-title">TIME</div>
  <div class="clock">
    <div class="unit">
      <div class="flip-group" id="hours"></div>
      <div class="unit-label">Hour</div>
    </div>
    <div class="separator"><div class="dot"></div><div class="dot"></div></div>
    <div class="unit">
      <div class="flip-group" id="minutes"></div>
      <div class="unit-label">Min</div>
    </div>
  </div>
  <div class="color-picker" id="color-picker"></div>
</div>

<script>
  const themes = [
    { bg: '#C0504A', dark: false },
    { bg: '#D4845A', dark: false },
    { bg: '#C9A84C', dark: false },
    { bg: '#5A9E72', dark: false },
    { bg: '#4A7EB5', dark: false },
    { bg: '#8A6BAE', dark: false },
    { bg: '#C47A96', dark: false },
    { bg: '#8B6A52', dark: true  },
    { bg: '#7A8490', dark: true  },
    { bg: '#3A3A3C', dark: true  },
  ];

  const picker = document.getElementById('color-picker');
  themes.forEach((t, i) => {
    const s = document.createElement('div');
    s.className = 'swatch' + (i === 0 ? ' active' : '');
    s.style.background = t.bg;
    s.onclick = () => applyTheme(i, s);
    picker.appendChild(s);
  });

  function applyTheme(i, el) {
    const t = themes[i];
    document.documentElement.style.setProperty('--bg', t.bg);
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    el.classList.add('active');
    const textAlpha = t.dark ? 'rgba(255,255,255,0.3)' : 'rgba(0,0,0,0.3)';
    const dotColor  = t.dark ? 'rgba(255,255,255,0.4)' : 'rgba(0,0,0,0.45)';
    const pillBg    = t.dark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.15)';
    const pillBd    = t.dark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.18)';
    document.querySelectorAll('.clock-title, .unit-label').forEach(e => e.style.color = textAlpha);
    document.querySelectorAll('.dot').forEach(d => d.style.background = dotColor);
    picker.style.background  = pillBg;
    picker.style.borderColor = pillBd;
  }

  function makeHalf(topOrBot, extraClass) {
    const div = document.createElement('div');
    div.className = `half ${topOrBot} ${extraClass}`;
    const box = document.createElement('div');
    box.className = 'digit-box';
    box.innerHTML = '<span>0</span>';
    div.appendChild(box);
    return div;
  }

  function createFlipCard() {
    const card = document.createElement('div');
    card.className = 'flip-card';

    const staticTop = makeHalf('top', 'static-top');
    const staticBot = makeHalf('bot', 'static-bot');
    const flapTop   = makeHalf('top', 'flap-top');
    const flapBot   = makeHalf('bot', 'flap-bot');
    const hinge     = document.createElement('div');
    hinge.className = 'hinge';

    card.appendChild(staticTop);
    card.appendChild(staticBot);
    card.appendChild(flapBot);   // below flap-top
    card.appendChild(flapTop);   // on top
    card.appendChild(hinge);
    return card;
  }

  function buildGroup(id) {
    const el = document.getElementById(id);
    const c1 = createFlipCard(), c2 = createFlipCard();
    el.appendChild(c1); el.appendChild(c2);
    return [c1, c2];
  }

  const hourCards = buildGroup('hours');
  const minCards  = buildGroup('minutes');
  let prev = { h: -1, m: -1 };

  function setText(half, val) {
    half.querySelector('span').textContent = val;
  }

  function setDigit(card, newVal, oldVal) {
    const staticTop = card.querySelector('.static-top');
    const staticBot = card.querySelector('.static-bot');
    const flapTop   = card.querySelector('.flap-top');
    const flapBot   = card.querySelector('.flap-bot');

    if (newVal === oldVal) {
      setText(staticTop,newVal);setText(staticBot,newVal);return;
    }
    setText(staticTop, oldVal);
    setText(staticBot, oldVal);
    setText(flapTop, oldVal);
    setText(flapBot, newVal);
    flapTop.style.visibility='visible';
    flapBot.style.visibility='hidden';
    flapTop.classList.remove('flipping'); void flapTop.offsetWidth; flapTop.classList.add('flipping');
    setTimeout(()=>{
      setText(staticTop,newVal);
      setText(staticBot,newVal);
      flapBot.style.visibility='visible';
      flapBot.animate([{transform:'rotateX(90deg)'},{transform:'rotateX(0deg)'}],{duration:200,easing:'cubic-bezier(.4,0,.2,1)'});
    },200);
    flapTop.addEventListener('animationend',()=>{
      flapTop.classList.remove('flipping');
      flapTop.style.visibility='hidden';
      flapBot.style.visibility='hidden';
    },{once:true});
  }

  function setTwoDigit(cards, value, oldValue) {
    const n = String(value).padStart(2, '0');
    const o = String(oldValue < 0 ? value : oldValue).padStart(2, '0');
    setDigit(cards[0], n[0], o[0]);
    setDigit(cards[1], n[1], o[1]);
  }

  const dots = document.querySelectorAll('.dot');

  function tick() {
    const now = new Date();
    const h = now.getHours(), m = now.getMinutes(), s = now.getSeconds();
    setTwoDigit(hourCards, h, prev.h);
    setTwoDigit(minCards,  m, prev.m);
    prev = { h, m };
    dots.forEach(d => d.classList.toggle('off', s % 2 === 1));
  }

  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
